experiment:
  name: full_condition_lstm_lr1e-3_reduce_on_plateau
  run_root: ${RUN_ROOT}

data:
  processed_root: ${PROCESSED_ROOT}
  use_cache: true
  rebuild_cache: false
  write_outputs_csv: false
  datasets:
    - name: calcite_wat_sat_data_3
      rock: Calcite
      path: ${DATA_ROOT}/wat_sat/Calcite/Calcite_wat_sat_data_3
    - name: dolomite_wat_sat_data_2
      rock: Dolomite
      path: ${DATA_ROOT}/wat_sat/Dolomite/Dolomite_wat_sat_data_2
  split:
    strategy: rock_aware_run_level
    train: 0.8
    val: 0.1
    test: 0.1
    seed: 42

model:
  hidden_size: 128
  num_layers: 2
  dropout: 0.0

training:
  epochs: 100
  batch_size: 64
  learning_rate: 0.001
  weight_decay: 0.0
  grad_clip: 1.0
  num_workers: 2
  seed: 42
  scheduler:
    type: reduce_on_plateau
    factor: 0.5
    patience: 10
    min_lr: 0.000001

plots:
  max_runs: 5
  features: all
