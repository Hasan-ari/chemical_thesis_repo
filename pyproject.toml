[tool.ruff]
line-length = 100
target-version = "py311"
extend-exclude = [
    "archive",
    "data/matlab_reference",
    "experiments",
    "related-papers",
]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "W",   # pycodestyle warnings
    "I",   # isort
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
]
ignore = [
    "E501",  # line too long — handled by formatter
    "B008",  # function call in default arg — common in scientific Python
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["B011"]  # allow assert in tests
"notebooks/**" = ["E402", "F401"]  # imports often staged across cells

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
